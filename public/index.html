<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div id="navbar"></div>
    <h2>Upcoming Payments</h2>

    <div class="filter-bar">

        <button onclick="loadUpcomingPayments('today')">
            Today
        </button>

        <button onclick="loadUpcomingPayments('week')">
            This Week
        </button>

        <button onclick="loadUpcomingPayments('month')">
            This Month
        </button>

        <input type="month" id="monthPicker" onchange="loadUpcomingPayments('custom')">

    </div>

    <div id="upcomingList" class="card"></div>

    <h2>Monthly Payment Status</h2>

    <label for="monthSelector">Select month</label>
    <input type="month" id="monthSelector" />

    <div id="loadingSpinner" style="display:none">Loading...</div>

    <div id="monthlyStatusList"></div>
    <div id="installmentProgressContainer"></div>

    <h2>Add Transaction</h2>

    <form id="transactionForm">

        <input type="text" id="title" placeholder="Description" required />

        <input type="number" id="amount" placeholder="Amount" step="0.01" required />

        <select id="type" required>
            <option value="">Select Type</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <select id="category" required>
            <option value="">Select Category</option>
        </select>

        <input type="date" id="date" required />

        <button type="submit">
            Save Transaction
        </button>

    </form>

    <h3>Transactions</h3>
    <ul id="transactionList"></ul>


    <h2>Hire Purchase</h2>

    <form id="hireForm">

        <input id="hp_title" placeholder="Item name" required>

        <input id="hp_amount" type="number" placeholder="Total price" required>

        <input id="hp_months" type="number" placeholder="Months" required>

        <select id="hp_category"></select>

        <input id="hp_start" type="date" required>

        <button>Create Installment</button>

    </form>


    <h2>Scheduled Payment</h2>
    <form id="scheduleForm">
        <input id="s_title" placeholder="Title" required>
        <input id="s_amount" type="number" required>
        <select id="s_type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
        </select>
        <select id="s_category"></select> <!-- populated by loadCategories() -->
        <input id="s_start" type="date" required>
        <input id="s_end" type="date">
        <select id="s_frequency">
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
        </select>
        <button type="submit">Create Schedule</button>
    </form>

    <div class="container mt-4">

        <div class="row">

            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h5>Expense Chart</h5>
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <h2>Monthly Cashflow</h2>
    <div style="height:300px; width:100%;">
        <canvas id="monthlyChart"></canvas>
    </div>

    <h2>Hire Purchase Remaining Balance</h2>
    <div style="height:300px; width:100%;">
        <canvas id="hireBalanceChart"></canvas>
    </div>

</body>
<!-- <script src="js/app.js"></script>
<script src="script.js"></script> -->
<script src="js/api.js"></script>
<script src="js/categories.js"></script>

<!-- saveTransaction lives here -->
<script src="js/transactions.js"></script>

<script src="js/hirePurchase.js"></script>
<script src="js/charts.js"></script>

<!-- uses saveTransaction -->
<script src="js/ui.js"></script>

<!-- startup controller -->
<script src="js/initApp.js"></script>

<!-- dashboard controller -->
<script src="js/dashboard.js"></script>

<!-- monthly status controller -->
<script src="js/monthlyStatus.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script>
fetch("/components/navbar.html")
  .then(res => res.text())
  .then(data => {
      document.getElementById("navbar").innerHTML = data;
  });
</script>

<script>
    // Place this after the form (or wrap in DOMContentLoaded)
    document.getElementById("type").addEventListener("change", e => {
        updateCategoryDropdown(e.target.value);
    });
</script>


<script>
    function updateCategoryDropdown(type) {

        const select =
            document.getElementById("category");

        select.innerHTML =
            '<option value="">Select Category</option>';

        categories
            .filter(c => c.type === type)
            .forEach(cat => {

                const option =
                    document.createElement("option");

                option.value = cat.id;
                option.textContent = cat.name;

                select.appendChild(option);
            });
    }
</script>
