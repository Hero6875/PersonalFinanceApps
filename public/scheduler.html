<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div id="navbar"></div>
    <h2>Payment Scheduler</h2>

    <form id="schedulerForm" class="mb-4">

        <div class="mb-3">
            <label for="schedTitle" class="form-label">Description</label>
            <input type="text" id="schedTitle" class="form-control" required />
        </div>

        <div class="mb-3">
            <label for="schedAmount" class="form-label">Amount</label>
            <input type="number" id="schedAmount" class="form-control" step="0.01" required />
        </div>

        <div class="mb-3">
            <label for="schedType" class="form-label">Type</label>
            <select id="schedType" class="form-select" required>
                <option value="">Select Type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="schedCategory" class="form-label">Category</label>
            <select id="schedCategory" class="form-select" required>
                <option value="">Select Category</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="schedDate" class="form-label">Start Date</label>
            <input type="date" id="schedDate" class="form-control" required />
        </div>

        <div class="mb-3">
            <label for="schedFrequency" class="form-label">Frequency</label>
            <select id="schedFrequency" class="form-select" required>
                <option value="">Select Frequency</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">
            Schedule Payment
        </button>

    </form>

    <h3>Scheduled Payments</h3>

    <ul id="scheduledList"></ul>
</body>

<script>
    fetch("/components/navbar.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;
        });
</script>
